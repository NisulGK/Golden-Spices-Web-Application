<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/base :: layout(~{::content}, 'Wholesale')">

<div th:fragment="content" class="container py-5">

  <h2>Place Wholesale Order</h2>

  <!--
    NOTE: This page creates a NEW order directly.
    The productId must be passed from the product selection.
    Typically, users reach the order form from /wholesale/products.
    If you need a standalone order form, ensure productId is populated.
  -->

  <form th:action="@{/wholesale/order}" method="post" class="mt-4">

    <!-- Product selection — populated server-side -->
    <div class="mb-3">
      <label class="form-label">Product</label>
      <select name="productId" class="form-select" required>
        <option value="">— Choose a product —</option>
        <option th:each="p : ${products}"
                th:value="${p.id}"
                th:text="${p.name} + ' — LKR ' + ${p.price} + ' / unit (min ' + ${p.minimumQuantity} + ')'">
        </option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Quantity</label>
      <input type="number" name="quantity" min="1"
             class="form-control" placeholder="Enter quantity" required>
      <div class="form-text text-muted">
        Minimum quantity depends on the product selected.
        Orders over 100 units receive a 10% bulk discount.
      </div>
    </div>

    <!-- Payment method -->
    <div class="mb-3">
      <label class="form-label">Payment Method</label>
      <div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio"
                 name="paymentStatus" value="PAY_LATER" id="applyPayLater" checked>
          <label class="form-check-label" for="applyPayLater">Pay Later (Invoice)</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio"
                 name="paymentStatus" value="PAID" id="applyPayNow">
          <label class="form-check-label" for="applyPayNow">Pay Now</label>
        </div>
      </div>
    </div>

    <button type="submit" class="btn btn-warning">
      <i class="bi bi-send-fill me-1"></i> Submit Wholesale Order
    </button>

  </form>

</div>
</html>
