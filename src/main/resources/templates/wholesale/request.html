<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::main}, 'Wholesale Request')}">

<main>
    <div class="container py-5">

        <div class="card shadow-lg border-0 p-4 text-center">

            <h3 class="fw-bold mb-3">Apply for Wholesale Account</h3>

            <p class="text-muted">
                Wholesale customers receive bulk pricing and special payment terms.
            </p>

            <!--
              FIX: Was posting to /wholesale/request — controller maps to /wholesale/request-access.
              Now uses /wholesale/request-access (WholesaleController.requestAccess).
              The controller also keeps /wholesale/request as an alias for backward-compatibility.
            -->
            <form th:action="@{/wholesale/request-access}" method="post">
                <button type="submit" class="btn btn-warning btn-lg px-5">
                    Request Wholesale Access
                </button>
            </form>

            <!-- Flash messages forwarded via RedirectAttributes -->
            <div th:if="${success}" class="alert alert-success mt-4" th:text="${success}"></div>
            <div th:if="${error}"   class="alert alert-danger  mt-4" th:text="${error}"></div>

        </div>

    </div>
</main>
</html>
