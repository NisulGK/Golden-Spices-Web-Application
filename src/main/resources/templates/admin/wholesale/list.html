<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/base :: layout(~{::content}, 'Admin Wholesale')">

<div th:fragment="content" class="container py-5">

    <div class="d-flex align-items-center justify-content-between mb-4">
        <h2 class="mb-0">Wholesale Orders (Admin)</h2>
        <a th:href="@{/admin/wholesale/dashboard}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Dashboard
        </a>
    </div>

    <div th:if="${#lists.isEmpty(orders)}" class="alert alert-info">
        No wholesale orders found.
    </div>

    <div class="table-responsive" th:if="${!#lists.isEmpty(orders)}">
        <table class="table table-bordered table-hover align-middle">
            <thead class="table-light">
            <tr>
                <th>#</th>
                <th>Customer</th>
                <!--
                  FIX: Was using o.productName — field does not exist on WholesaleOrder.
                  The entity has a @ManyToOne relationship: o.product.name is correct.
                -->
                <th>Product</th>
                <th>Qty</th>
                <th>Unit Price</th>
                <th>Total</th>
                <th>Order Status</th>
                <th>Payment</th>
                <th>Date</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="o : ${orders}">
                <td class="text-muted small" th:text="'#' + ${o.id}">—</td>

                <!-- Customer name — safe null guard -->
                <td th:text="${o.user != null ? o.user.fullName : '—'}">—</td>

                <!-- Product name via relationship — FIXED -->
                <td th:text="${o.product != null ? o.product.name : '—'}">—</td>

                <td th:text="${o.quantity} + ' units'">—</td>

                <td th:text="'LKR ' + ${#numbers.formatDecimal(o.unitPrice,   1,'COMMA',2,'POINT')}">0</td>
                <td th:text="'LKR ' + ${#numbers.formatDecimal(o.totalAmount, 1,'COMMA',2,'POINT')}">0</td>

                <!-- Order status badge -->
                <td>
                    <span class="badge"
                          th:classappend="${o.status == 'APPROVED'} ? 'bg-success' :
                                          (${o.status == 'SHIPPED'} ? 'bg-primary' : 'bg-warning text-dark')"
                          th:text="${o.status}">—</span>
                </td>

                <!-- Payment status badge -->
                <td>
                    <span class="badge"
                          th:classappend="${o.paymentStatus == 'PAID'} ? 'bg-success' : 'bg-secondary'"
                          th:text="${o.paymentStatus}">—</span>
                </td>

                <td class="text-muted small"
                    th:text="${o.createdAt != null ?
                        #temporals.format(o.createdAt,'dd MMM yy') : '—'}">—</td>

                <!-- Update status -->
                <td>
                    <form th:action="@{/admin/wholesale/orders/{id}/status(id=${o.id})}"
                          method="post" class="d-flex gap-1 flex-wrap">
                        <select name="status" class="form-select form-select-sm" style="width:130px;">
                            <option value="PENDING"  th:selected="${o.status == 'PENDING'}">Pending</option>
                            <option value="APPROVED" th:selected="${o.status == 'APPROVED'}">Approved</option>
                            <option value="SHIPPED"  th:selected="${o.status == 'SHIPPED'}">Shipped</option>
                        </select>
                        <button type="submit" class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-check-lg"></i>
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>
</html>
