<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::main}, 'Error — GOLDEN')}">
<main>
    <style>
        .err-page{min-height:60vh;display:flex;align-items:center;justify-content:center;padding:60px 20px;font-family:'Jost',sans-serif;}
        .err-box{text-align:center;max-width:480px;}
        .err-code{font-family:'Cinzel',serif;font-size:5rem;font-weight:700;color:#c8841f;line-height:1;margin-bottom:12px;}
        .err-title{font-family:'Cinzel',serif;font-size:1.4rem;font-weight:700;color:#1a1208;margin-bottom:10px;}
        .err-msg{font-size:.92rem;color:#7a6444;line-height:1.7;margin-bottom:28px;}
        .btn-g{display:inline-flex;align-items:center;gap:8px;padding:11px 26px;background:linear-gradient(135deg,#8a5c0c,#c8841f);color:#fff;border:none;border-radius:9px;font-size:.88rem;font-weight:700;font-family:'Jost',sans-serif;text-decoration:none;}
    </style>
    <div class="err-page">
        <div class="err-box">
            <div class="err-code" th:text="${status ?: 500}">500</div>
            <div class="err-title" th:text="${error ?: 'Something went wrong'}">Error</div>
            <div class="err-msg" th:text="${message ?: 'An unexpected error occurred. Please try again.'}">An unexpected error occurred.</div>
            <a href="/" class="btn-g"><i class="bi bi-house"></i> Back to Home</a>
        </div>
    </div>
</main>
</html>
