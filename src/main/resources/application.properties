# ==================================================
# DATABASE CONFIGURATION (SQL SERVER)
# ==================================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=GoldenSpicesDB;encrypt=false;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=kanishka123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ==================================================
# JPA / HIBERNATE
# ==================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==================================================
# STATIC RESOURCES
# ==================================================
spring.web.resources.static-locations=classpath:/static/

# ==================================================
# APPLICATION BASE URL
# ==================================================
app.baseUrl=http://localhost:8080

# ==================================================
# MOCK PAYMENT CONFIGURATION
# ==================================================
app.payment.mode=mock

