<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::main}, 'Wholesale Order Detail')}">

<main>
  <div class="container py-4">

    <div class="d-flex align-items-center gap-2 mb-4">
      <a th:href="@{/wholesale}" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Back
      </a>
      <h3 class="mb-0">Wholesale Order Detail</h3>
    </div>

    <div class="card shadow-sm">
      <div class="card-body">

        <!--
          FIX: Was using order.productName — that field does not exist on WholesaleOrder.
          WholesaleOrder has a @ManyToOne WholesaleProduct, so use order.product.name.
        -->
        <p>
          <strong>Product:</strong>
          <span th:text="${order.product != null ? order.product.name : '—'}">—</span>
        </p>

        <p>
          <strong>Quantity:</strong>
          <span th:text="${order.quantity}">0</span> units
        </p>

        <p>
          <strong>Unit Price:</strong>
          LKR
          <span th:text="${#numbers.formatDecimal(order.unitPrice, 1, 'COMMA', 2, 'POINT')}">0.00</span>
        </p>

        <p>
          <strong>Total Amount:</strong>
          LKR
          <span th:text="${#numbers.formatDecimal(order.totalAmount, 1, 'COMMA', 2, 'POINT')}">0.00</span>
        </p>

        <p>
          <strong>Order Status:</strong>
          <span class="badge"
                th:classappend="${order.status == 'APPROVED'} ? 'bg-success' :
                                 (${order.status == 'SHIPPED'} ? 'bg-primary' : 'bg-warning text-dark')"
                th:text="${order.status}">PENDING</span>
        </p>

        <p>
          <strong>Payment:</strong>
          <span class="badge"
                th:classappend="${order.paymentStatus == 'PAID'} ? 'bg-success' : 'bg-secondary'"
                th:text="${order.paymentStatus}">PAY_LATER</span>
        </p>

        <p>
          <strong>Placed on:</strong>
          <span th:text="${order.createdAt != null ?
              #temporals.format(order.createdAt, 'dd MMM yyyy, HH:mm') : '—'}">—</span>
        </p>

      </div>
    </div>

  </div>
</main>
</html>
