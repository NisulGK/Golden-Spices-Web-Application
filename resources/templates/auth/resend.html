<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::main}, 'Resend Verification — GOLDEN')}">
<main>
  <style>
    :root{--g:#c8841f;--gd:#8a5c0c;--gl:#e8a94a;--gp:#fdf4e3;--dk:#1a1208;--bd:#3d2e14;--mu:#7a6444;--wh:#fff;--of:#faf7f2;--br:#e8dfc9;}
    .rs-page{min-height:calc(100vh - 200px);display:flex;align-items:center;justify-content:center;padding:60px 20px;font-family:'Jost',sans-serif;background:var(--of);}
    .rs-card{background:var(--wh);border-radius:22px;box-shadow:0 20px 60px rgba(0,0,0,.11);width:100%;max-width:440px;overflow:hidden;}
    .rs-top{background:linear-gradient(135deg,var(--gd),var(--g),var(--gl));padding:34px 40px 28px;text-align:center;}
    .rs-icon{width:64px;height:64px;background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.35);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:1.7rem;color:#fff;}
    .rs-title{font-family:'Cinzel',serif;font-size:1.4rem;font-weight:700;color:#fff;margin-bottom:5px;}
    .rs-sub{font-size:.84rem;color:rgba(255,255,255,.72);}
    .rs-body{padding:30px 40px 34px;}
    .alert{display:flex;align-items:flex-start;gap:10px;padding:12px 15px;border-radius:10px;margin-bottom:20px;font-size:.86rem;font-weight:500;}
    .alert-err{background:#fff4f4;border:1px solid #f5b8b8;color:#a31515;}
    .alert-err i{color:#e74c3c;flex-shrink:0;margin-top:2px;}
    .alert-warn{background:#fff8e1;border:1px solid #f5c94a;color:#7a5c00;}
    .alert-warn i{color:#e6ac00;flex-shrink:0;margin-top:2px;}
    .f-group{margin-bottom:20px;}
    .f-label{display:block;font-size:.73rem;font-weight:700;color:var(--bd);letter-spacing:.8px;text-transform:uppercase;margin-bottom:7px;}
    .f-wrap{position:relative;}
    .f-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--mu);font-size:.9rem;pointer-events:none;}
    .f-input{width:100%;padding:11px 13px 11px 40px;border:1.5px solid var(--br);border-radius:9px;font-size:.92rem;font-family:'Jost',sans-serif;color:var(--dk);background:var(--of);outline:none;transition:.2s;}
    .f-input:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(200,132,31,.12);background:var(--wh);}
    .btn-g{width:100%;padding:12px;background:linear-gradient(135deg,var(--gd),var(--g));color:#fff;border:none;border-radius:9px;font-size:.92rem;font-weight:700;font-family:'Jost',sans-serif;cursor:pointer;transition:.22s;box-shadow:0 4px 14px rgba(200,132,31,.28);display:flex;align-items:center;justify-content:center;gap:8px;}
    .btn-g:hover{background:linear-gradient(135deg,var(--g),var(--gl));transform:translateY(-1px);}
    .rs-back{margin-top:16px;text-align:center;font-size:.82rem;color:var(--mu);}
    .rs-back a{color:var(--g);font-weight:600;text-decoration:none;}
    .rs-back a:hover{text-decoration:underline;}
    @media(max-width:480px){.rs-body,.rs-top{padding-left:24px;padding-right:24px;}}
  </style>

  <div class="rs-page">
    <div class="rs-card">
      <div class="rs-top">
        <div class="rs-icon"><i class="bi bi-envelope-arrow-up"></i></div>
        <div class="rs-title">Resend Verification</div>
        <div class="rs-sub">We'll send a new verification link</div>
      </div>
      <div class="rs-body">

        <!-- Token expired warning -->
        <div class="alert alert-warn" th:if="${tokenExpired}">
          <i class="bi bi-clock"></i>
          <span>Your verification link has expired. Enter your email below to get a new one.</span>
        </div>

        <!-- Invalid token warning -->
        <div class="alert alert-warn" th:if="${invalidToken}">
          <i class="bi bi-exclamation-triangle"></i>
          <span>This verification link is invalid. Enter your email below to get a new one.</span>
        </div>

        <!-- Error from resend attempt -->
        <div class="alert alert-err" th:if="${error}">
          <i class="bi bi-exclamation-triangle-fill"></i>
          <span th:text="${error}">Error</span>
        </div>

        <form th:action="@{/auth/resend}" method="post">
          <div class="f-group">
            <label class="f-label" for="resendEmail">Your Email Address</label>
            <div class="f-wrap">
              <i class="bi bi-envelope f-icon"></i>
              <input class="f-input" id="resendEmail" name="email"
                     type="email" placeholder="your@email.com"
                     required autocomplete="email" autofocus>
            </div>
          </div>
          <button type="submit" class="btn-g">
            <i class="bi bi-send"></i> Send Verification Email
          </button>
        </form>

        <div class="rs-back">
          Already verified? <a th:href="@{/auth/login}">Sign in here</a>
        </div>
      </div>
    </div>
  </div>
</main>
</html>
