<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::main}, 'Manage Orders')}">
<main>
  <style>
    :root{--g:#c8841f;--gd:#8a5c0c;--gl:#e8a94a;--gp:#fdf4e3;--gpp:#f0d898;--dk:#1a1208;--bd:#3d2e14;--mu:#7a6444;--wh:#fff;--of:#faf7f2;--br:#e8dfc9;}
    .adm-wrap{max-width:1200px;margin:0 auto;padding:36px 32px 72px;font-family:'Jost',sans-serif;}

    /* Header */
    .adm-hd{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:28px;flex-wrap:wrap;}
    .adm-hd-tag{font-size:.63rem;letter-spacing:5px;text-transform:uppercase;color:var(--g);font-weight:700;margin-bottom:6px;}
    .adm-hd-title{font-family:'Cinzel',serif;font-size:clamp(1.4rem,2.5vw,1.9rem);font-weight:700;color:var(--dk);}
    .adm-hd-title i{color:var(--g);margin-right:8px;}

    /* Filter bar */
    .filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px;align-items:center;}
    .filter-bar a{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:.8rem;font-weight:600;text-decoration:none;border:1.5px solid var(--br);color:var(--mu);background:var(--wh);transition:.2s;}
    .filter-bar a:hover,.filter-bar a.active{background:var(--g);color:#fff;border-color:var(--g);}
    .filter-search{display:flex;gap:8px;margin-left:auto;}
    .filter-search input{padding:8px 14px;border:1.5px solid var(--br);border-radius:8px;font-size:.85rem;font-family:'Jost',sans-serif;color:var(--dk);width:220px;}
    .filter-search input:focus{outline:none;border-color:var(--g);}
    .filter-search button{padding:8px 16px;background:var(--g);color:#fff;border:none;border-radius:8px;font-size:.84rem;font-weight:700;cursor:pointer;}

    /* Flash */
    .flash-success{background:#edfaf3;border:1px solid #7dd4a0;color:#145a28;padding:12px 18px;border-radius:10px;margin-bottom:18px;font-size:.9rem;display:flex;align-items:center;gap:8px;}
    .flash-error{background:#fff4f4;border:1px solid #f5b8b8;color:#a31515;padding:12px 18px;border-radius:10px;margin-bottom:18px;font-size:.9rem;display:flex;align-items:center;gap:8px;}

    /* Table */
    .ord-table{width:100%;border-collapse:collapse;background:var(--wh);border-radius:14px;overflow:hidden;box-shadow:0 3px 18px rgba(0,0,0,.07);}
    .ord-table thead tr{background:var(--of);border-bottom:2px solid var(--br);}
    .ord-table th{padding:13px 16px;font-size:.72rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--mu);font-weight:700;text-align:left;white-space:nowrap;}
    .ord-table td{padding:14px 16px;border-bottom:1px solid var(--br);font-size:.88rem;color:var(--dk);vertical-align:middle;}
    .ord-table tbody tr:last-child td{border-bottom:none;}
    .ord-table tbody tr:hover{background:var(--of);}

    /* Order number */
    .ord-num-link{font-family:'Cinzel',serif;font-size:.88rem;font-weight:700;color:var(--dk);text-decoration:none;}
    .ord-num-link:hover{color:var(--g);}

    /* Status badges */
    .st-badge{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:4px 12px;font-size:.7rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;}
    .st-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
    .st-PENDING    {background:#fff8f0;border:1px solid #f0c898;color:#8a5c0c;}
    .st-PENDING .st-dot    {background:#e67e22;}
    .st-CONFIRMED  {background:#f0f4ff;border:1px solid #b8c8f5;color:#1a3a8a;}
    .st-CONFIRMED .st-dot  {background:#3a6adf;}
    .st-PROCESSING {background:#fdf4e3;border:1px solid var(--gpp);color:var(--gd);}
    .st-PROCESSING .st-dot {background:var(--g);}
    .st-SHIPPED    {background:#f0faf5;border:1px solid #a8e6c5;color:#1a5a30;}
    .st-SHIPPED .st-dot    {background:#27ae60;}
    .st-OUT_FOR_DELIVERY{background:#edfaf3;border:1px solid #7dd4a0;color:#145a28;}
    .st-OUT_FOR_DELIVERY .st-dot{background:#1a7a46;}
    .st-DELIVERED  {background:#edfaf3;border:1px solid #7dd4a0;color:#145a28;}
    .st-DELIVERED .st-dot  {background:#1a8a46;}
    .st-CANCELLED  {background:#fff4f4;border:1px solid #f5b8b8;color:#a31515;}
    .st-CANCELLED .st-dot  {background:#e74c3c;}

    /* Payment badges */
    .pay-badge{display:inline-flex;align-items:center;gap:4px;border-radius:6px;padding:3px 9px;font-size:.68rem;font-weight:700;}
    .pay-PAID    {background:#edfaf3;border:1px solid #a8e6c5;color:#1a7a46;}
    .pay-PENDING {background:#fff8f0;border:1px solid #f0c898;color:#8a5c0c;}
    .pay-FAILED  {background:#fff4f4;border:1px solid #f5b8b8;color:#a31515;}
    .pay-REFUNDED{background:#f4f0ff;border:1px solid #c8b8f5;color:#5a1a8a;}

    /* Action buttons */
    .btn-view{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;background:linear-gradient(135deg,var(--gd),var(--g));color:#fff;border-radius:7px;text-decoration:none;font-size:.78rem;font-weight:700;transition:.2s;}
    .btn-view:hover{opacity:.9;color:#fff;}

    /* Empty state */
    .ord-empty{text-align:center;padding:64px 24px;background:var(--of);border-radius:16px;border:1px dashed var(--br);margin-top:8px;}
    .ord-empty i{font-size:3rem;color:#d8cbb8;display:block;margin-bottom:14px;}
    .ord-empty-t{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--dk);margin-bottom:8px;}
    .ord-empty-s{font-size:.88rem;color:var(--mu);}

    /* Count badge */
    .count-badge{background:var(--g);color:#fff;border-radius:20px;padding:2px 10px;font-size:.72rem;font-weight:700;margin-left:8px;}

    @media(max-width:900px){
      .adm-wrap{padding:20px 14px 52px;}
      .ord-table th:nth-child(4),.ord-table td:nth-child(4),
      .ord-table th:nth-child(5),.ord-table td:nth-child(5){display:none;}
      .filter-bar{flex-direction:column;align-items:flex-start;}
      .filter-search{margin-left:0;width:100%;}
      .filter-search input{width:100%;}
    }
  </style>

  <div class="adm-wrap">

    <!-- Header -->
    <div class="adm-hd">
      <div>
        <div class="adm-hd-tag">Admin Panel</div>
        <h1 class="adm-hd-title">
          <i class="bi bi-list-check"></i>Manage Orders
          <span class="count-badge" th:text="${#lists.size(orders)}">0</span>
        </h1>
      </div>
      <a th:href="@{/admin}" class="btn-view" style="background:var(--wh);color:var(--bd);border:1.5px solid var(--br);box-shadow:none;">
        <i class="bi bi-speedometer2"></i> Dashboard
      </a>
    </div>

    <!-- Flash messages -->
    <div class="flash-success" th:if="${success}">
      <i class="bi bi-check-circle-fill"></i>
      <span th:text="${success}"></span>
    </div>
    <div class="flash-error" th:if="${error}">
      <i class="bi bi-exclamation-circle-fill"></i>
      <span th:text="${error}"></span>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
      <a th:href="@{/admin/orders}"
         th:class="${filterStatus == null and param.orderNumber == null} ? 'active' : ''">
        <i class="bi bi-grid-3x3-gap"></i>All
      </a>
      <a th:each="s : ${statuses}"
         th:href="@{/admin/orders(status=${s})}"
         th:class="${filterStatus == s} ? 'active' : ''"
         th:text="${s}">STATUS</a>

      <form class="filter-search" th:action="@{/admin/orders}" method="get">
        <input type="text" name="orderNumber" placeholder="Search order number…"
               th:value="${param.orderNumber}"/>
        <button type="submit"><i class="bi bi-search"></i></button>
      </form>
    </div>

    <!-- Empty state -->
    <div class="ord-empty" th:if="${#lists.isEmpty(orders)}">
      <i class="bi bi-inbox"></i>
      <div class="ord-empty-t">No Orders Found</div>
      <p class="ord-empty-s">Try a different filter or search term.</p>
    </div>

    <!-- Orders Table -->
    <table class="ord-table" th:if="${!#lists.isEmpty(orders)}">
      <thead>
      <tr>
        <th>Order #</th>
        <th>Customer</th>
        <th>Date</th>
        <th>Items</th>
        <th>Total</th>
        <th>Status</th>
        <th>Payment</th>
        <th>Action</th>
      </tr>
      </thead>
      <tbody>
      <!-- null-safe: skip any null order rows -->
      <th:block th:each="order : ${orders}" th:if="${order != null}">
        <tr>
          <td>
            <a th:href="@{/admin/orders/{id}(id=${order.id})}"
               class="ord-num-link"
               th:text="${order.orderNumber}">ORD000</a>
          </td>
          <td>
            <div style="font-weight:600;" th:text="${order.customerName}">—</div>
            <div style="font-size:.78rem;color:var(--mu);" th:text="${order.customerEmail}">—</div>
          </td>
          <td>
            <span th:text="${order.createdAt != null}
              ? ${#temporals.format(order.createdAt,'dd MMM yyyy')}
              : '—'">Date</span>
            <div style="font-size:.75rem;color:var(--mu);"
                 th:text="${order.createdAt != null}
                   ? ${#temporals.format(order.createdAt,'hh:mm a')}
                   : ''"></div>
          </td>
          <td th:text="${itemCounts != null and itemCounts[order.id] != null} ? ${itemCounts[order.id]} + ' item(s)' : '—'">—</td>
          <td>
            <span style="font-family:'Cinzel',serif;font-size:.9rem;color:var(--g);font-weight:700;">
              LKR <span th:text="${order.totalAmount != null}
                ? ${#numbers.formatDecimal(order.totalAmount,1,'COMMA',2,'POINT')}
                : '0.00'">0.00</span>
            </span>
          </td>
          <td>
            <div th:class="'st-badge st-' + ${order.status}">
              <span class="st-dot"></span>
              <span th:text="${order.status}">PENDING</span>
            </div>
          </td>
          <td>
            <div th:if="${order.paymentStatus != null}"
                 th:class="'pay-badge pay-' + ${order.paymentStatus}"
                 th:text="${order.paymentStatus}">—</div>
            <span th:if="${order.paymentStatus == null}" style="color:var(--mu);font-size:.8rem;">—</span>
          </td>
          <td>
            <a th:href="@{/admin/orders/{id}(id=${order.id})}" class="btn-view">
              <i class="bi bi-eye"></i> View
            </a>
          </td>
        </tr>
      </th:block>
      </tbody>
    </table>

  </div>
</main>
</html>
