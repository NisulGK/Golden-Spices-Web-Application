<!--
  wholesale.html  — embeddable fragment / standalone section
  Used inside base layout where ${user} is the current User object.

  FIX: form action was /wholesale/request → corrected to /wholesale/request-access
-->
<div class="card shadow-sm border-0 p-5 text-center">

  <h2 class="fw-bold mb-3">Apply for Wholesale Account</h2>
  <p class="text-muted mb-4">
    Wholesale customers receive bulk pricing and special payment terms.
  </p>

  <!-- STATE 1: Not yet requested -->
  <div th:if="${!user.wholesaleRequested and !user.wholesaleApproved}">
    <form th:action="@{/wholesale/request-access}" method="post" style="width:100%;">
      <button type="submit" class="btn btn-warning btn-lg px-5">
        <i class="bi bi-send-fill me-1"></i> Request Wholesale Access
      </button>
    </form>
    <p class="ws-gateway-note mt-3">
      <i class="bi bi-info-circle"></i>
      Applications are typically reviewed within 1–2 business days.
    </p>
  </div>

  <!-- STATE 2: Requested but not yet approved -->
  <div th:if="${user.wholesaleRequested and !user.wholesaleApproved}">
    <div class="alert alert-warning mt-4">
      <i class="bi bi-hourglass-split me-1"></i>
      Your wholesale request is <strong>under review</strong>.
      Admin will approve soon.
    </div>
  </div>

  <!-- STATE 3: Approved -->
  <div th:if="${user.wholesaleApproved}">
    <div class="alert alert-success mt-4">
      <i class="bi bi-patch-check-fill me-1"></i>
      Your wholesale account is <strong>approved!</strong>
    </div>
    <a th:href="@{/wholesale/products}"
       class="btn btn-success btn-lg mt-3">
      <i class="bi bi-grid-fill me-1"></i> View Wholesale Products
    </a>
  </div>

</div>
